services:
  cf-browser:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: cross-site-tracker-cf-browser
    environment:
      - WARMUP_URL=https://mangafire.to/home
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cross-site-tracker-api
    env_file:
      - ./backend/.env.example
    environment:
      - SQLITE_PATH=/app/data/app.sqlite
      - MIGRATIONS_PATH=/app/migrations
      - CF_BROWSER_URL=http://cf-browser:8191
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    depends_on:
      cf-browser:
        condition: service_healthy
